bead: home-duo-insight-6m3
summary: >-
  Removed the hardcoded Firecrawl `wait 3000ms + scroll` actions array from
  parse-properties; a live A/B test proved the actions hurt rather than helped.
branch: bd/home-duo-insight-6m3-firecrawl-actions
sha: <filled-after-commit>
base_branch: main

files_changed:
  - supabase/functions/parse-properties/index.ts

investigation:
  method: >-
    Live A/B test against the self-hosted Firecrawl (http://localhost:3002,
    confirmed working). Test harness in
    .agents/reports/home-duo-insight-6m3/firecrawl-ab-test.ts reuses the actual
    extractImageUrls() copied verbatim from parse-properties/index.ts:187-317
    (the function is not exported). 4 Firecrawl configs x 4 live listing URLs
    (2 SUUMO, 2 athome). Raw results in ab-results.json.
  note_on_test_urls: >-
    The SUUMO/athome URLs hardcoded in the repo test scripts (nc_73125861 etc.)
    are EXPIRED -> SUUMO 404 error page, athome statusCode 404. Re-ran against
    fresh live listings verified 2026-05-16 (statusCode 200).
  findings:
    - >-
      Any `actions` array (wait+scroll, scroll-only, or wait-800+scroll) causes
      the self-hosted Firecrawl to return HTTP 500 SCRAPE_ALL_ENGINES_FAILED on
      EVERY SUUMO/athome scrape. The current production code captures ZERO
      images when run against a self-hosted Firecrawl.
    - >-
      With NO actions, SUUMO scrapes succeed: full HTML (200-270KB,
      130-180 `gazo` image refs) and extractImageUrls() captures 20 images per
      listing. Verified on 4 SUUMO listings.
    - >-
      athome.co.jp serves a bot-challenge interstitial ("認証中" / authenticating)
      regardless of actions. `no actions` gets the challenge page (0 property
      images), `actions` gets a 500. The actions never helped athome.
  decision: >-
    Remove the actions array. It added a flat ~3s critical-path floor per URL,
    broke self-hosted Firecrawl entirely, and provided no image-capture benefit
    on either site. Decision documented in a code comment at the call site.

