name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      # Emoji guard. The `local/no-emoji-jsx` rule is `warn` in the shared
      # eslint config so it never blocks builds on pre-existing emoji
      # (see CONTRIBUTING.md cleanup list). This step escalates it to
      # `error` and reports any emoji introduced in JSX/TSX. It is allowed
      # to fail until the documented existing offenders are migrated to
      # Lucide React icons; flip `continue-on-error` to false once the
      # cleanup list in CONTRIBUTING.md is empty.
      - name: Emoji guard (no emoji in JSX/TSX)
        continue-on-error: true
        run: npm run lint:emoji
