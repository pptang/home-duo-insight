name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      # Emoji guard. The `local/no-emoji-jsx` rule is `warn` in the shared
      # eslint config so it never blocks local builds, but this step
      # escalates it to `error` and hard-fails CI on any Unicode emoji in
      # source. All pre-existing offenders have been migrated to Lucide
      # React icons, so this step is now blocking.
      - name: Emoji guard (no emoji in JSX/TSX)
        run: npm run lint:emoji
